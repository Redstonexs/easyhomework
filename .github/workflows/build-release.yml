name: Build and Pre-Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="1.0.0"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407
        id: sign
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Locate APK
        id: apk
        run: |
          if [ "${{ steps.sign.outcome }}" = "success" ]; then
            echo "path=${{ steps.sign.outputs.signedReleaseFile }}" >> "$GITHUB_OUTPUT"
          else
            APK=$(find app/build/outputs/apk/release -name "app-release*.apk" | head -n1)
            echo "path=$APK" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "EasyHomework ${{ steps.version.outputs.tag }}"
          prerelease: true
          files: ${{ steps.apk.outputs.path }}
